# ============================================================
# 北向文件统一解析器 - 配置文件
# ============================================================

global:
  worker_processes: 10
  log_retention_days: 30
  dynamic_pool:
    enabled: true
    min_workers: 1
    max_workers: null          # null 表示使用 worker_processes
    file_size_threshold: 50    # MB，超过此值视为大文件
    large_file_workers: 2      # 每个大文件占用的等效 worker 数
    history_window: 5          # 参考最近 N 轮的历史数据

postgres_config:
  host: localhost
  port: 5432
  user: postgres
  password: "10300"
  database: postgres
  connection_pool:
    min_connections: 2
    max_connections: 10
  batch_insert:
    page_size: 5000

# ---------- 4G 配置 ----------
